<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Vector favicon: crisp at every size (16px tab → 512px install icon) with no binary asset to
         ship. mask-icon covers Safari pinned tabs; theme-color tints the mobile browser chrome. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1a3287" />
    <meta name="theme-color" content="#16307d" />
    <title>TailorResume</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
